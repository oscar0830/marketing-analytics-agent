<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Analytics Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 40px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    .chat-box {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      min-height: 300px;
      max-height: 450px;
      overflow-y: auto;
      background: #fafafa;
      margin-bottom: 16px;
    }

    .msg {
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .user {
      background: #dbeafe;
      text-align: right;
    }

    .bot {
      background: #e5e7eb;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 14px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      padding: 14px 18px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .note {
      margin-top: 12px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Marketing Analytics Chat</h1>

    <div class="chat-box" id="chatBox">
      <div class="msg bot">
        Hi — ask me a question about campaign performance, budget allocation, or scenario comparison.
      </div>
    </div>

    <div class="row">
      <input
        id="questionInput"
        type="text"
        placeholder="Ask a question like: Which channel performed best and why?"
      />
      <button id="sendBtn">Send</button>
    </div>

    <div class="note">
      This demo sends your question to an n8n webhook, which analyzes campaign data and returns an AI-generated answer.
    </div>
  </div>

  <script>
    const WEBHOOK_URL = "https://oscar-spartan.app.n8n.cloud/webhook/50fa5465-c125-4f5e-940b-e78abbc68a38";

    function addMessage(text, sender) {
      const chatBox = document.getElementById("chatBox");
      const msg = document.createElement("div");
      msg.className = `msg ${sender}`;
      msg.textContent = text;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendQuestion() {
      const input = document.getElementById("questionInput");
      const question = input.value.trim();

      if (!question) return;

      addMessage(question, "user");
      input.value = "";

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ question })
        });

        const raw = await response.text();
        console.log("Raw webhook response:", raw);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${raw}`);
        }

        if (!raw) {
          throw new Error("Empty response body from webhook.");
        }

        let answer = raw;

        try {
          const data = JSON.parse(raw);
          answer =
            data.answer ||
            data.response ||
            data.output ||
            JSON.stringify(data, null, 2);
        } catch (e) {
          answer = raw;
        }

        addMessage(
          typeof answer === "string"
            ? answer
            : JSON.stringify(answer, null, 2),
          "bot"
        );
      } catch (error) {
        addMessage("Sorry, something went wrong connecting to the workflow.", "bot");
        console.error("Webhook error:", error);
      }
    }

    document.getElementById("sendBtn").addEventListener("click", sendQuestion);

    document.getElementById("questionInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        sendQuestion();
      }
    });
  </script>
</body>
</html>
